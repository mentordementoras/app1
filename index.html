<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Draw - Info-Producers Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="brushSize" min="1" max="20" value="5">
        <button id="clear">Limpiar Lienzo</button>
        <button id="sendToGemini">Analizar con Gemini</button>
    </div>
    <canvas id="drawingCanvas"></canvas>
    <div id="responseArea">
        <h3>Análisis de Gemini:</h3>
        <p id="geminiOutput">Dibuja algo y presiona analizar...</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
